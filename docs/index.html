<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RDC Platform Status</title>
<style>
  body {
    font-family: sans-serif;
    max-width: 40rem;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 0.5rem;
  }
  .dot {
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-up { background: #2ecc71; }
  .status-incident { background: #f1c40f; }
  .status-down { background: #e74c3c; }
  .status-unknown { background: #95a5a6; }
  a {
    color: inherit;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  .last-updated {
    color: #888;
    margin-top: -0.5rem;
    margin-bottom: 1.5rem;
  }
</style>
</head>
<body>
<h1>RDC Platform Status</h1>
<p class="last-updated" id="last-updated"></p>
<div id="services"></div>
<script>
  fetch('status.json')
    .then((res) => res.json())
    .then((data) => {
      document.getElementById('last-updated').textContent =
        'Last updated: ' + new Date(data.generatedAt).toLocaleString();

      const container = document.getElementById('services');
      for (const service of data.services) {
        const card = document.createElement('div');
        card.className = 'card';

        const dot = document.createElement('span');
        dot.className = 'dot ' + service.status;

        const link = document.createElement('a');
        link.href = service.url;
        const statusText = service.status.replace('status-', '');
        link.textContent = service.name + ' (' + statusText + ')';

        card.append(dot, link);
        container.append(card);
      }
    });
</script>
</body>
</html>
